# Render.com: New → Blueprint → укажи этот репозиторий. Секреты впишешь в дашборде.
services:
  - type: web
    name: ai-proxy
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_API_KEY
        sync: false          # впишешь в дашборде Render (секрет)
      - key: CLIENT_TOKENS
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LLM_BASE_URL
        value: https://api.deepseek.com
      - key: LLM_MODEL
        value: deepseek-chat
      - key: RATE_LIMIT_PER_MIN
        value: "30"
